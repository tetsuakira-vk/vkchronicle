name: Post quality check

on:
  push:
    branches: [main]
    paths:
      - "_posts/**"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect empty-body or duplicate-image posts
        id: detect
        run: python3 scripts/check_posts.py

      - name: Quarantine flagged posts
        if: steps.detect.outputs.flagged == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts _drafts
          git commit -m "Auto-quarantine empty/duplicate posts flagged by CI"
          git push

      - name: Fail if issues were found
        if: steps.detect.outputs.flagged == 'true'
        run: |
          echo "One or more new posts had an empty body or reused an existing post's image. They were moved to _drafts/ in a follow-up commit."
          exit 1
