<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  {% seo %}
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="/feed.xml">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <a href="/" class="site-logo">
          <span class="logo-text">VK Chronicle</span>
          <span class="logo-sub">Visual Kei News &amp; Reviews</span>
        </a>
        <nav class="site-nav">
          <a href="/">News</a>
          <a href="/bands/">Bands</a>
          <a href="/reviews/">Reviews</a>
          <a href="/releases/">New Releases</a>
          <a href="/tour-dates/">Tour Dates</a>
          <a href="/about/">About</a>
        </nav>
        <button class="nav-toggle" aria-label="Menu">&#9776;</button>
      </div>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ 'now' | date: "%Y" }} VK Chronicle &mdash; English Visual Kei news for Western fans.</p>
      <p><a href="/feed.xml">RSS Feed</a> &middot; <a href="/sitemap.xml">Sitemap</a></p>
    </div>
  </footer>

  <script src="/assets/js/main.js"></script>
</body>
</html>
