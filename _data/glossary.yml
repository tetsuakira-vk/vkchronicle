# Visual Kei Glossary
# category: subgenre | live | industry | general | aesthetic

- term: "Angura Kei"
  japanese: "アングラ系"
  letter: "A"
  category: "subgenre"
  definition: "Short for 'underground kei.' An extreme subgenre pulling from Japanese folklore, kabuki theatre, and horror imagery. Angura kei bands typically perform in traditional Japanese garb reimagined through a grotesque lens — heavy use of red and white, face paint, and dramatic storytelling. Key acts include Kagrra, and Kagerou."

- term: "Bandoman"
  japanese: "バンドマン"
  letter: "B"
  category: "general"
  definition: "A band member. Used casually and broadly in Japanese music culture to mean anyone who plays in a band — not specific to Visual Kei, but ubiquitous in the scene. Often used with a slightly ironic or affectionate edge when describing a musician's lifestyle."

- term: "Charisma"
  japanese: "カリスマ"
  letter: "C"
  category: "general"
  definition: "A frontman or musician regarded as having an extraordinary, almost mythical stage presence. In VK, 'charisma' is used as a noun — someone is described as 'a charisma' — implying they transcend normal performer status and have built a near-cult following. YOSHIKI, Kyo, and Mana are the classic examples."

- term: "Disbandment"
  japanese: "解散 (kaisan)"
  letter: "D"
  category: "industry"
  definition: "The official dissolution of a band. In VK, disbandment is often announced months in advance with farewell live tours, final releases, and elaborate goodbye ceremonies. The drama surrounding disbandment is treated seriously — some farewell lives sell out in minutes. Not to be confused with hiatus."

- term: "Furi"
  japanese: "振り"
  letter: "F"
  category: "live"
  definition: "Choreographed hand and arm movements performed by the audience in sync during live shows. Furi are specific to each song — fans learn the correct movements and perform them in unison, creating a coordinated visual effect from the crowd. Getting the furi right is a point of pride for dedicated fans."

- term: "Gyaku Dive"
  japanese: "逆ダイブ"
  letter: "G"
  category: "live"
  definition: "Literally 'reverse dive.' Where a normal stage dive involves a performer jumping into the crowd, a gyaku dive is the opposite — audience members are lifted by the crowd and passed toward the stage, sometimes physically reaching or touching the performer. A common occurrence at high-energy VK lives."

- term: "Hensei"
  japanese: "編成"
  letter: "H"
  category: "industry"
  definition: "A lineup change — the addition, departure, or replacement of a band member. Hensei announcements are a constant of VK culture, ranging from adding a support member to losing a founding guitarist. Fans track hensei obsessively as they often signal a shift in a band's direction."

- term: "Hiatus"
  japanese: "活動休止 (katsudou kyuushi)"
  letter: "H"
  category: "industry"
  definition: "A temporary suspension of band activities. Unlike disbandment, a hiatus implies intent to return — though in VK, the line is sometimes blurry. Bands on hiatus often return years later for revival lives or new releases. The announcement is typically accompanied by a farewell live."

- term: "Indies"
  japanese: "インディーズ"
  letter: "I"
  category: "industry"
  definition: "An independent release — music put out on a small indie label or self-released, as opposed to signing with a major label. In VK, the indies scene is its own parallel world with its own release formats, live circuit, and fan culture. Many bands spend their entire careers on indies and some actively resist going major."

- term: "Iryou Kei"
  japanese: "医療系"
  letter: "I"
  category: "subgenre"
  definition: "Literally 'medical kei.' A subgenre built around hospital and surgical aesthetics — bandages, surgical masks, bloody scrubs, IV imagery. The sound tends toward the extreme end of VK, matching the disturbing visual concept. More of an aesthetic category than a strictly defined sound. Linked to the broader body horror tradition in underground VK."

- term: "Kirakira Kei"
  japanese: "キラキラ系"
  letter: "K"
  category: "subgenre"
  definition: "Literally 'sparkly kei.' A bright, glittery, hyper-colourful subgenre emphasising flash and fun over darkness. Kirakira kei bands lean into costume excess, high-energy pop hooks, and a generally celebratory atmosphere. Often overlaps with oshare kei. Think candy colours, rhinestones, and theatrical but cheerful performances."

- term: "Kote Kei"
  japanese: "コテ系"
  letter: "K"
  category: "subgenre"
  definition: "The classic early Visual Kei aesthetic — heavy white and black makeup, Victorian and gothic costume influences, dramatic hairstyles. Kote kei refers to the look and feel of 90s VK at its most theatrical. Bands like early BUCK-TICK, X Japan, and Malice Mizer are the touchstones. The term is used retrospectively — acts didn't call themselves kote kei at the time."

- term: "Loud Kei"
  japanese: "ラウド系"
  letter: "L"
  category: "subgenre"
  definition: "The heavy end of the VK spectrum — metalcore, thrash, and extreme metal influences paired with full VK visuals. Loud kei bands keep the elaborate aesthetics but push the sound into aggressive territory. Dir en grey and exist†trace are the most internationally recognised examples. The subgenre grew in prominence through the 2000s."

- term: "Menhera Kei"
  japanese: "メンヘラ系"
  letter: "M"
  category: "subgenre"
  definition: "Derived from 'mental health.' A subgenre engaging with themes of depression, self-harm, dissociation, and psychological distress — both lyrically and visually. Menhera kei imagery typically includes bandages, hospital gowns, and a fragile aesthetic. Controversial for its treatment of mental health themes, but an established part of the VK canon."

- term: "Nagoya Kei"
  japanese: "名古屋系"
  letter: "N"
  category: "subgenre"
  definition: "A dark, heavy underground sound that emerged from Nagoya's live circuit in the early 1990s. Heavier than mainstream VK, with death metal and industrial influences and a deliberately aggressive, uncompromising aesthetic. Named for its geographic origin. Key acts include Deadman, Kuroyume, La:Sadie's, and Despairs Ray."

- term: "Oneman"
  japanese: "ワンマン"
  letter: "O"
  category: "live"
  definition: "A solo headline show — one band performing alone, without support acts. In VK, onsemans are a milestone event. A band's first oneman at a notable venue is treated as a major achievement and is typically a longer, more elaborate show than a standard taiban set. Selling out an oneman is a key marker of a band's fanbase size."

- term: "Oshi"
  japanese: "推し"
  letter: "O"
  category: "general"
  definition: "Your favourite — the band member you support most intensely. The concept comes from idol culture but is deeply embedded in VK fan culture. Having an oshi means buying their solo merchandise, attending their birthday events, and generally channelling most of your fan energy in one direction. Not unique to VK but central to how the fanbase operates."

- term: "Oshare Kei"
  japanese: "オシャレ系"
  letter: "O"
  category: "subgenre"
  definition: "Literally 'fashionable kei.' A bright, colourful subgenre emphasising pop hooks, playful aesthetics, and accessible energy — the opposite pole from nagoya kei. Oshare kei bands typically use vivid costumes, cheerful visuals, and upbeat tempos. An Café and LM.C are the archetypal acts. Peaked in the mid-2000s."

- term: "Sekai-kan"
  japanese: "世界観"
  letter: "S"
  category: "general"
  definition: "Literally 'worldview.' The complete aesthetic and conceptual universe a band constructs around themselves — visual identity, lyrical themes, stage persona, merchandise aesthetic, and overall atmosphere. In VK, sekai-kan is everything. A band with a strong sekai-kan has a coherent, immersive world fans can inhabit; a weak one feels like a collection of disconnected choices."

- term: "Taiban"
  japanese: "対バン"
  letter: "T"
  category: "live"
  definition: "A multi-band live event where two or more acts share a bill. The standard format of the VK indie live circuit — bands build audiences by playing taiban shows at small venues, gradually working up to headlining slots and eventually onsemans. The taiban circuit is the primary way new bands are discovered."

- term: "Tensai"
  japanese: "天才"
  letter: "T"
  category: "general"
  definition: "Literally 'genius.' Used to describe musicians of exceptional or prodigious ability — a genuine term of admiration rather than hyperbole. In VK circles, calling someone a tensai is a serious compliment about their musicianship or compositional skill. Applied to figures like YOSHIKI, Kaoru of Dir en grey, and Mana of Malice Mizer."

- term: "Visual Kei"
  japanese: "ビジュアル系"
  letter: "V"
  category: "general"
  definition: "Literally 'visual style' or 'visual system.' A Japanese music movement defined by theatrical makeup, elaborate costumes, androgynous aesthetics, and a diverse range of sounds from glam pop to extreme metal. The term emerged in the late 1980s and is widely attributed to X Japan's early self-description. It describes a philosophy as much as a genre — the visual presentation is inseparable from the music."

- term: "Wasei Eigo"
  japanese: "和製英語"
  letter: "W"
  category: "general"
  definition: "Japanese-constructed English — words that look like English but carry different meanings in Japanese usage. Common in VK band names and song titles. Wasei eigo creates an exotic, international-sounding aesthetic without being genuinely foreign. Examples in VK include words like 'visual' itself being used as a noun, or 'live' meaning a concert/show."
