# Visual Kei Magazines
# status: active | defunct
# focus: vk | j-rock | guitar | general

- name: "SHOXX"
  japanese: "ショックス"
  years: "1990–2008"
  status: "defunct"
  frequency: "Monthly"
  focus: "vk"
  description: "The definitive Visual Kei magazine of the genre's golden era. SHOXX documented the early 90s underground through the peak commercial years — if a band mattered between 1990 and 2008, they were in SHOXX. Essential primary source material for the scene's history."
  notable: "285 issues. Covered X Japan, Dir en grey, BUCK-TICK, L'Arc~en~Ciel, LUNA SEA during their most important years."

- name: "FOOL'S MATE"
  japanese: "フールズメイト"
  years: "1990–2010"
  status: "defunct"
  frequency: "Monthly"
  focus: "vk"
  description: "A long-running monthly that ran in parallel with the VK boom from start to finish. FOOL'S MATE covered the full spectrum from major acts to deeper underground bands, and its 20-year run makes it one of the most complete archives of the genre's rise and decline."
  notable: "150+ issues. Notable for coverage of darker and more underground acts alongside mainstream VK."

- name: "Cure"
  japanese: "キュア"
  years: "2003–2022"
  status: "defunct"
  frequency: "Monthly"
  focus: "vk"
  description: "The last great dedicated Visual Kei magazine. Cure launched at the start of the 2000s VK revival and ran for 219 monthly issues across 19 years, outlasting almost every contemporary. It also produced international spin-offs (Cure USA) and specialty editions including Cure Mani and Cure doll."
  notable: "219 issues. Ran international editions for overseas fans. Closed December 2021."

- name: "ROCK AND READ"
  japanese: "ロックアンドリード"
  years: "2010–2022"
  status: "defunct"
  frequency: "Bi-monthly"
  focus: "vk"
  description: "Interview-first and text-heavy by design — each issue was built around long-form conversations with artists rather than photo spreads. ROCK AND READ gave bands space to talk properly, making it the most journalistic of the dedicated VK publications. Ran to exactly 100 issues."
  notable: "100 issues. Produced spin-off editions: ROCK AND READ BAND, ROCK AND READ eyes, ROCK AND READ vocal."

- name: "B-PASS"
  japanese: "ビーパス"
  years: "1985–2004"
  status: "defunct"
  frequency: "Monthly"
  focus: "j-rock"
  description: "One of the earliest rock magazines to give serious coverage to the emerging VK scene. B-PASS predated the VK label itself, covering Japanese rock broadly — but its archives from the late 80s and early 90s are an invaluable record of the genre forming in real time."
  notable: "Nearly 20 years of publication. Key early coverage of acts like BUCK-TICK and X Japan before VK had a name."

- name: "GiGS"
  japanese: "ギグス"
  years: "1989–2022"
  status: "defunct"
  frequency: "Monthly"
  focus: "guitar"
  description: "A guitar and band technique magazine that straddled J-rock and Visual Kei throughout its run. GiGS focused more on the craft side — equipment, playing styles, tabs — than the scene gossip that dominated other magazines. Widely read by musicians in the scene themselves."
  notable: "33-year run. Notable for gear and technique features on VK guitarists and bassists."

- name: "ONGAKU TO HITO"
  japanese: "音楽と人"
  years: "1994–present"
  status: "active"
  frequency: "Monthly"
  focus: "j-rock"
  description: "A broader Japanese rock and pop magazine that consistently featured Visual Kei acts alongside mainstream artists. ONGAKU TO HITO is notable for longer, more personal interview features rather than news coverage — bands often gave more candid interviews here than in dedicated VK titles."
  notable: "One of the few rock magazines from the 90s still in print. Known for unusually frank artist interviews."

- name: "PATi PATi"
  japanese: "パチパチ"
  years: "1984–2011"
  status: "defunct"
  frequency: "Monthly"
  focus: "j-rock"
  description: "A photo-forward fan magazine covering Japanese pop and rock, with heavy VK representation throughout the 90s and 2000s. PATi PATi leaned into the idol and fan culture side of VK more than the music press angle — big on pin-ups, member profiles, and fan service content."
  notable: "27-year run. Hugely popular with the teenage fan demographic during VK's mainstream peak."
