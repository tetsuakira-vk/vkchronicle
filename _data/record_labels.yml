- name: "MAVERICK DC GROUP"
  location: "Tokyo"
  type: "vk-indie"
  status: "active"
  description: "Parent company of DANGER CRUE and one of the most powerful independent groups in Japanese rock. Their infrastructure underpins some of the genre's biggest careers."
  notable_bands: ["L'Arc~en~Ciel", "SID", "MUCC", "DEZERT", "Petit Brabancon"]
  sublabels: ["DANGER CRUE", "13 Bishop"]
  vkgy: "https://vk.gy/labels/maverick-dc-group/"

