  sublabels: ["Indie PSC."]
  vkgy: "https://vk.gy/labels/ps-company/"

- name: "FREE-WILL"
  location: "Tokyo"
  founded: "c. 1992"
  type: "vk-indie"
  status: "active"
  description: "One of the longest-running indie labels in VK. Home to Dir en grey during their formative indie years, and still active today through KIZU and MERRY."
