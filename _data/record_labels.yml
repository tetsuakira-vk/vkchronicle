  sublabels: ["FIREWALL DIV.", "Anarchist Records", "BIG FOREST RECORDS", "DAMAGE", "Einustar Records"]
  vkgy: "https://vk.gy/labels/free-will/"

- name: "DANGER CRUE"
  location: "Tokyo"
  founded: "1981"
  type: "vk-indie"
  status: "active"
  parent: "MAVERICK DC GROUP"
