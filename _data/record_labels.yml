- name: "PS COMPANY"
  short: "PSC"
  japanese: "PS カンパニー"
  location: "Tokyo"
  founded: "2000"
  type: "vk-indie"
  status: "active"
  description: "One of the most influential indie labels of the 2000s VK boom. Responsible for breaking the GazettE, ALICE NINE., and a generation of acts that defined the scene internationally."
