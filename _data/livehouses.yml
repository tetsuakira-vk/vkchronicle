- name: "Nippon Budokan"
  japanese: "日本武道館"
  area: "Chiyoda, Tokyo"
  prefecture: "Tokyo"
  type: "Arena"
  note: "The holy grail — X Japan, L'Arc-en-Ciel, and Dir en grey have all played here."
  website: "https://www.nipponbudokan.or.jp"
  maps: "https://maps.google.com/?q=Nippon+Budokan+Tokyo+Japan"

